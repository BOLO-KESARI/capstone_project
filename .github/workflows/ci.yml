name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Run data quality checks
        run: python -c "from data_quality.rules import run_quality_checks; print('DQ module OK')"

      - name: Verify database schema
        run: python -c "from database.schema import init_database; init_database(); print('DB schema OK')"

      - name: Verify ML modules
        run: |
          python -c "from ml_advanced.time_series import MultiHorizonEngine; print('Time-series OK')"
          python -c "from ml_advanced.shap_explainer import shap_explainer; print('SHAP OK')"
          python -c "from ml_advanced.drift_detector import drift_detector; print('Drift detector OK')"
          python -c "from ml_advanced.model_registry import model_registry; print('Model registry OK')"

      - name: Verify optimization modules
        run: |
          python -c "from optimization.scenario_engine import scenario_engine; print('Scenario engine OK')"
          python -c "from optimization.multi_objective import multi_objective_optimizer; print('MO optimizer OK')"
          python -c "from optimization.cold_start import cold_start_strategy; print('Cold start OK')"

      - name: Lint check
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,.venv,_not_used

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t airline-revenue-mgmt .
      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8000:8000 airline-revenue-mgmt
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
